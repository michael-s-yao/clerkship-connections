<!DOCTYPE html>
<html lang="en-US" style="scroll-behavior: smooth;">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>clerkship connections</title>
    <link rel="stylesheet" type="text/css" href="public/css/index.css">
    <link rel="stylesheet" type="text/css" href="public/css/menu.css">
    <link rel="stylesheet" type="text/css" href="public/css/game.css">
    <link rel="stylesheet" type="text/css" href="public/css/mobile.css">
    <meta name="theme-color" content="#f1f1f1;">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P4GGV3P3RE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-P4GGV3P3RE');
    </script>
  </head>
  <body>
    <div class="overlay" id="resultOverlay" style="display:none">
      <div class="result-card">
        <div class="result-emoji" id="resultEmoji"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-msg"   id="resultMsg"></div>
        <div class="result-stats">
          <div class="result-stat-item">
            <div class="result-stat-value" id="rsSolved">—</div>
            <div class="result-stat-label">Solved</div>
          </div>
          <div class="result-stat-item">
            <div class="result-stat-value" id="rsPlayed">—</div>
            <div class="result-stat-label">Played</div>
          </div>
          <div class="result-stat-item">
            <div class="result-stat-value" id="rsAccuracy">—</div>
            <div class="result-stat-label">Accuracy</div>
          </div>
        </div>
        <div class="result-actions">
          <button class="btn" onclick="shuffle()">New Puzzle</button>
          <button class="btn primary" onclick="closeResult()">See Board</button>
        </div>
      </div>
    </div>


    <div class="app" id="app" style="display:none">
      <div class="sidebar">
        <div class="sidebar-icons">
          <button class="icon-btn" id="darkToggleBtn" onclick="toggleDark()" title="Toggle dark mode" aria-label="Toggle dark mode">
            <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1"  x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3"  y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
          <a class="icon-btn" id="githubBtn" href="https://github.com/michael-s-yao/clerkship-connections" target="_blank" rel="noopener" title="View on GitHub" aria-label="GitHub">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8
                c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </div>
        <div class="stats-block">
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-value" id="statSolved">0</div>
              <div class="stat-label">Solved</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statAccuracy">—</div>
              <div class="stat-label">Accuracy</div>
            </div>
          </div>
        </div>
        <div class="category-section">
          <div class="sidebar-label">Category</div>
          <div class="category-list" id="categoryList"></div>
        </div>
        <div class="sidebar-actions">
          <button class="action-btn" onclick="shuffle()">&#x21C4; shuffle the board</button>
          <button
            class="action-btn contribute-btn"
            onclick="window.open('https://forms.gle/mVQ1RHkc1AHd2G9y6', 'new_window');"
          >+ contribute a connection</button>
          <!-- <button class="action-btn support-btn" onclick="TODO">&#9825; support this work</button> -->
        </div>
        <footer>
          <p>&#169;<span id="year"></span> <a href="https://www.michaelsyao.com" target="_blank">michael yao</a></p>
        </footer>
      </div>

      <div class="main">
        <div class="game-title">clerkship connections</div>
        <div class="game-subtitle">like the <a href="https://www.nytimes.com/games/connections" target="_blank">new york times version</a> but for med students<br>also inspired by <a href="https://www.openevidence.com" target="_blank">open evidence synapses</a></div>
        <p id="message">&emsp;</p>
        <div class="mistakes">
          <span class="mistakes-label">Mistakes remaining:</span>
          <div class="mistake-dot" id="dot0"></div>
          <div class="mistake-dot" id="dot1"></div>
          <div class="mistake-dot" id="dot2"></div>
          <div class="mistake-dot" id="dot3"></div>
        </div>
        <div id="solvedRows"></div>
        <div class="grid-wrapper">
          <div class="grid" id="grid"></div>
        </div>
        <div class="controls">
          <button class="btn" id="deselectBtn" onclick="deselectAll()" disabled>deselect all</button>
          <button class="btn primary" id="submitBtn" onclick="submitGuess()" disabled>submit</button>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="public/js/cookies.js"></script>
    <script type="text/javascript" src="public/js/stats.js"></script>
    <script type="text/javascript" src="public/js/color.js"></script>
    <script type="text/javascript" src="public/js/game.js"></script>
    <script type="text/javascript" src="public/js/helper.js"></script>
    <script type="text/javascript">
      document.getElementById("year").innerHTML = new Date().getFullYear();
    </script>
  </body>
</html>
